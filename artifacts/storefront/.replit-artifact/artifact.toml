kind = "web"
previewPath = "/"
title = "Storefront"
version = "1.0.0"
id = "artifacts/storefront"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18539

[services.development]
run = "pnpm --filter @workspace/storefront run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/storefront", "run", "build" ]
publicDir = "artifacts/storefront/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18539"
BASE_PATH = "/"
